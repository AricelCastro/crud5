# Perfil para Azure SQL Database
# Ejecuta con: SPRING_PROFILES_ACTIVE=azure

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://alumnos-sql-server.database.windows.net:1433;database=alumnos_tec_alumnos;encrypt=yes;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sqladmin@alumnos-sql-server}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SqlPwd123!Secure}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
