# Perfil para Azure Database for MySQL (Flexible Server)
# Ejecuta con: SPRING_PROFILES_ACTIVE=azure

spring.datasource.url=${AZURE_DB_URL:jdbc:mysql://<tu-servidor>.mysql.database.azure.com:3306/alumnos?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${AZURE_DB_USERNAME:<usuario>@<tu-servidor>}
spring.datasource.password=${AZURE_DB_PASSWORD:<tu-password>}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
